name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p dist
          cp index.html ./dist
          cp index.js ./dist
          cp styles.css ./dist
          cp service-worker.js ./dist
          cp manifest.json ./dist
          cp CNAME ./dist
          cp _config.yml ./dist
          cp "Thomas SLOBODA - Hands-on Tech Lead · Fullstack JavaScript · Automation & AI.md" ./dist
          cp -r .well-known/ ./dist/.well-known
          cp -r assets/ ./dist/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
